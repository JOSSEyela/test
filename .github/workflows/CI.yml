name: CI


on:
  push:
    branches: [main]

jobs:
  check:
    name: Lint y build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
        
      - name: Install dependencias 
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true
      
      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
