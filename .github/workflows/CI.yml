name: CI


on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint y build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        
      - name: Install dependencias 
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true
      
      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
      
      - name: Subir artefacto dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7